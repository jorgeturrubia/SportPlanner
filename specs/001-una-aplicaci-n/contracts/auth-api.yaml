openapi: 3.0.3
info:
  title: SportPlanner Auth API
  description: Authentication and subscription management endpoints
  version: 1.0.0
servers:
  - url: https://api.sportplanner.com/v1
    description: Production server
  - url: https://localhost:7201/v1
    description: Development server

paths:
  /auth/register:
    post:
      summary: Register new user with subscription selection
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
                - subscriptionType
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                subscriptionType:
                  type: string
                  enum: [Free, Coach, Club]
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input data
        '409':
          description: User already exists

  /auth/login:
    post:
      summary: Authenticate user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      summary: Refresh JWT token
      operationId: refreshToken
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid or expired token

  /subscriptions:
    get:
      summary: Get available subscription types
      operationId: getSubscriptions
      responses:
        '200':
          description: Available subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'

  /subscriptions/user:
    get:
      summary: Get current user's subscriptions
      operationId: getUserSubscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSubscription'

    post:
      summary: Purchase or upgrade subscription
      operationId: purchaseSubscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subscriptionId
              properties:
                subscriptionId:
                  type: integer
                paymentMethodId:
                  type: string
      responses:
        '201':
          description: Subscription purchased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSubscription'
        '400':
          description: Invalid subscription or payment data
        '402':
          description: Payment required

components:
  schemas:
    AuthResponse:
      type: object
      required:
        - user
        - token
        - refreshToken
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time

    TokenResponse:
      type: object
      required:
        - token
        - expiresAt
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time

    User:
      type: object
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Subscription:
      type: object
      required:
        - id
        - name
        - price
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: decimal
        maxTeams:
          type: integer
        maxTrainings:
          type: integer
        canCreateCustomConcepts:
          type: boolean
        canAccessMarketplace:
          type: boolean
        canManageOrganizations:
          type: boolean

    UserSubscription:
      type: object
      required:
        - id
        - subscription
        - startDate
        - isActive
      properties:
        id:
          type: integer
        subscription:
          $ref: '#/components/schemas/Subscription'
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        paymentStatus:
          type: string
          enum: [Active, Cancelled, Failed]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT