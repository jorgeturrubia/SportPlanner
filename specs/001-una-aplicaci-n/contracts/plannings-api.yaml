openapi: 3.0.3
info:
  title: SportPlanner Plannings API
  description: Training planning and concept management endpoints
  version: 1.0.0
servers:
  - url: https://api.sportplanner.com/v1
    description: Production server
  - url: https://localhost:7201/v1
    description: Development server

paths:
  /plannings:
    get:
      summary: Get user's plannings
      operationId: getPlannings
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: query
          description: Filter by team
          schema:
            type: integer
        - name: isActive
          in: query
          description: Filter by active status
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of plannings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Planning'

    post:
      summary: Create new planning
      operationId: createPlanning
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanningRequest'
      responses:
        '201':
          description: Planning created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningDetails'
        '400':
          description: Invalid input data

  /plannings/{planningId}:
    get:
      summary: Get planning details
      operationId: getPlanning
      security:
        - bearerAuth: []
      parameters:
        - name: planningId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Planning details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningDetails'
        '404':
          description: Planning not found
        '403':
          description: Access denied

    put:
      summary: Update planning
      operationId: updatePlanning
      security:
        - bearerAuth: []
      parameters:
        - name: planningId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlanningRequest'
      responses:
        '200':
          description: Planning updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningDetails'

  /plannings/{planningId}/generate-trainings:
    post:
      summary: Generate training sessions automatically
      operationId: generateTrainings
      security:
        - bearerAuth: []
      parameters:
        - name: planningId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Trainings generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  trainingsCreated:
                    type: integer
                  trainings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Training'

  /plannings/{planningId}/marketplace:
    post:
      summary: Publish planning to marketplace
      operationId: publishToMarketplace
      security:
        - bearerAuth: []
      parameters:
        - name: planningId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Planning published
        '403':
          description: Coach+ subscription required

  /concepts:
    get:
      summary: Get available concepts (system + custom)
      operationId: getConcepts
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: difficulty
          in: query
          description: Filter by difficulty
          schema:
            type: string
            enum: [Beginner, Intermediate, Advanced]
        - name: includeCustom
          in: query
          description: Include user's custom concepts
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of concepts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Concept'

    post:
      summary: Create custom concept (Coach+ subscription required)
      operationId: createConcept
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConceptRequest'
      responses:
        '201':
          description: Concept created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Concept'
        '403':
          description: Coach+ subscription required

  /exercises:
    get:
      summary: Get available exercises
      operationId: getExercises
      security:
        - bearerAuth: []
      parameters:
        - name: conceptId
          in: query
          description: Filter by linked concept
          schema:
            type: integer
        - name: minPlayers
          in: query
          schema:
            type: integer
        - name: maxPlayers
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exercise'

    post:
      summary: Create custom exercise
      operationId: createExercise
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseRequest'
      responses:
        '201':
          description: Exercise created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'

  /marketplace:
    get:
      summary: Browse marketplace plannings
      operationId: browseMarketplace
      security:
        - bearerAuth: []
      parameters:
        - name: sport
          in: query
          schema:
            type: string
        - name: ageCategory
          in: query
          schema:
            type: string
            enum: [Alevin, Infantil, Cadete, Juvenil, Senior]
        - name: level
          in: query
          schema:
            type: string
            enum: [A, B, C]
        - name: minRating
          in: query
          schema:
            type: number
            minimum: 1
            maximum: 5
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Marketplace plannings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceResponse'

  /marketplace/{planningId}/import:
    post:
      summary: Import planning from marketplace
      operationId: importPlanning
      security:
        - bearerAuth: []
      parameters:
        - name: planningId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - teamId
              properties:
                teamId:
                  type: integer
                customName:
                  type: string
      responses:
        '201':
          description: Planning imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningDetails'

  /marketplace/{planningId}/rate:
    post:
      summary: Rate marketplace planning
      operationId: ratePlanning
      security:
        - bearerAuth: []
      parameters:
        - name: planningId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatePlanningRequest'
      responses:
        '201':
          description: Rating submitted
        '400':
          description: Invalid rating or already rated

components:
  schemas:
    Planning:
      type: object
      required:
        - id
        - name
        - startDate
        - endDate
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        trainingDays:
          type: array
          items:
            type: string
            enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        startTime:
          type: string
          format: time
        durationMinutes:
          type: integer
        isFullCourt:
          type: boolean
        isActive:
          type: boolean
        isInMarketplace:
          type: boolean
        marketplaceRating:
          type: number
          minimum: 1
          maximum: 5

    PlanningDetails:
      allOf:
        - $ref: '#/components/schemas/Planning'
        - type: object
          properties:
            concepts:
              type: array
              items:
                $ref: '#/components/schemas/PlanningConcept'
            teams:
              type: array
              items:
                $ref: '#/components/schemas/TeamBasic'
            trainingCount:
              type: integer

    CreatePlanningRequest:
      type: object
      required:
        - name
        - startDate
        - endDate
        - trainingDays
        - startTime
        - durationMinutes
        - teamIds
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        trainingDays:
          type: array
          items:
            type: string
            enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        startTime:
          type: string
          format: time
        durationMinutes:
          type: integer
          minimum: 30
          maximum: 300
        isFullCourt:
          type: boolean
        teamIds:
          type: array
          items:
            type: integer
        conceptIds:
          type: array
          items:
            type: integer

    UpdatePlanningRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        trainingDays:
          type: array
          items:
            type: string
        startTime:
          type: string
          format: time
        durationMinutes:
          type: integer
        isFullCourt:
          type: boolean
        isActive:
          type: boolean

    Concept:
      type: object
      required:
        - id
        - name
        - category
        - subcategory
        - difficulty
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        subcategory:
          type: string
        difficulty:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        estimatedLearningTimeHours:
          type: integer
        description:
          type: string
        isCustom:
          type: boolean

    CreateConceptRequest:
      type: object
      required:
        - name
        - category
        - subcategory
        - difficulty
        - estimatedLearningTimeHours
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        category:
          type: string
        subcategory:
          type: string
        difficulty:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        estimatedLearningTimeHours:
          type: integer
          minimum: 1
        description:
          type: string
          maxLength: 1000

    Exercise:
      type: object
      required:
        - id
        - name
        - description
        - durationMinutes
        - minPlayers
        - maxPlayers
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        equipment:
          type: string
        isCustom:
          type: boolean
        concepts:
          type: array
          items:
            $ref: '#/components/schemas/ConceptBasic'

    CreateExerciseRequest:
      type: object
      required:
        - name
        - description
        - durationMinutes
        - minPlayers
        - maxPlayers
        - conceptIds
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 2000
        durationMinutes:
          type: integer
          minimum: 1
        minPlayers:
          type: integer
          minimum: 1
        maxPlayers:
          type: integer
          minimum: 1
        equipment:
          type: string
          maxLength: 500
        conceptIds:
          type: array
          items:
            type: integer

    Training:
      type: object
      required:
        - id
        - planningId
        - teamId
        - scheduledDate
        - status
      properties:
        id:
          type: integer
        planningId:
          type: integer
        teamId:
          type: integer
        scheduledDate:
          type: string
          format: date-time
        location:
          type: string
        status:
          type: string
          enum: [Planned, InProgress, Completed, Cancelled]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        notes:
          type: string

    PlanningConcept:
      type: object
      required:
        - concept
        - priority
        - weightPercentage
      properties:
        concept:
          $ref: '#/components/schemas/ConceptBasic'
        priority:
          type: string
          enum: [Primary, Secondary, Tertiary]
        weightPercentage:
          type: number
          minimum: 0
          maximum: 100

    ConceptBasic:
      type: object
      required:
        - id
        - name
        - category
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        difficulty:
          type: string

    TeamBasic:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        ageCategory:
          type: string
        level:
          type: string

    MarketplaceResponse:
      type: object
      required:
        - plannings
        - totalCount
        - page
        - totalPages
      properties:
        plannings:
          type: array
          items:
            $ref: '#/components/schemas/MarketplacePlanning'
        totalCount:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    MarketplacePlanning:
      type: object
      required:
        - id
        - name
        - creatorName
        - rating
        - ratingCount
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        creatorName:
          type: string
        rating:
          type: number
          minimum: 1
          maximum: 5
        ratingCount:
          type: integer
        trainingDays:
          type: array
          items:
            type: string
        durationMinutes:
          type: integer
        conceptCount:
          type: integer
        targetAgeCategory:
          type: string
        targetLevel:
          type: string

    RatePlanningRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 500

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT