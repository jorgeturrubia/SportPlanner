openapi: 3.0.3
info:
  title: SportPlanner Teams API
  description: Team and organization management endpoints
  version: 1.0.0
servers:
  - url: https://api.sportplanner.com/v1
    description: Production server
  - url: https://localhost:7201/v1
    description: Development server

paths:
  /teams:
    get:
      summary: Get user's accessible teams
      operationId: getTeams
      security:
        - bearerAuth: []
      parameters:
        - name: organizationId
          in: query
          description: Filter by organization
          schema:
            type: integer
        - name: isActive
          in: query
          description: Filter by active status
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'

    post:
      summary: Create new team
      operationId: createTeam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '400':
          description: Invalid input data
        '403':
          description: Subscription limit exceeded

  /teams/{teamId}:
    get:
      summary: Get team details
      operationId: getTeam
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Team details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetails'
        '404':
          description: Team not found
        '403':
          description: Access denied

    put:
      summary: Update team
      operationId: updateTeam
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '400':
          description: Invalid input data
        '403':
          description: Access denied

    delete:
      summary: Archive team (soft delete)
      operationId: archiveTeam
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Team archived
        '403':
          description: Access denied

  /teams/{teamId}/members:
    get:
      summary: Get team members and roles
      operationId: getTeamMembers
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMember'

    post:
      summary: Invite user to team
      operationId: inviteTeamMember
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteTeamMemberRequest'
      responses:
        '201':
          description: Member invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMember'
        '400':
          description: Invalid input data
        '403':
          description: Access denied

  /organizations:
    get:
      summary: Get user's organizations
      operationId: getOrganizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'

    post:
      summary: Create organization (Club subscription required)
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Invalid input data
        '403':
          description: Club subscription required

components:
  schemas:
    Team:
      type: object
      required:
        - id
        - name
        - gender
        - ageCategory
        - level
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
          enum: [Masculine, Feminine, Mixed]
        ageCategory:
          type: string
          enum: [Alevin, Infantil, Cadete, Juvenil, Senior]
        level:
          type: string
          enum: [A, B, C]
        organizationId:
          type: integer
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean

    TeamDetails:
      allOf:
        - $ref: '#/components/schemas/Team'
        - type: object
          properties:
            plannings:
              type: array
              items:
                $ref: '#/components/schemas/PlanningBasic'
            memberCount:
              type: integer

    CreateTeamRequest:
      type: object
      required:
        - name
        - gender
        - ageCategory
        - level
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        gender:
          type: string
          enum: [Masculine, Feminine, Mixed]
        ageCategory:
          type: string
          enum: [Alevin, Infantil, Cadete, Juvenil, Senior]
        level:
          type: string
          enum: [A, B, C]
        organizationId:
          type: integer

    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        gender:
          type: string
          enum: [Masculine, Feminine, Mixed]
        ageCategory:
          type: string
          enum: [Alevin, Infantil, Cadete, Juvenil, Senior]
        level:
          type: string
          enum: [A, B, C]
        isActive:
          type: boolean

    TeamMember:
      type: object
      required:
        - userId
        - name
        - email
        - role
        - permission
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Coach, Assistant]
        permission:
          type: string
          enum: [FullAccess, ViewOnly, ExecuteOnly]
        joinedAt:
          type: string
          format: date-time

    InviteTeamMemberRequest:
      type: object
      required:
        - email
        - role
        - permission
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [Coach, Assistant]
        permission:
          type: string
          enum: [FullAccess, ViewOnly, ExecuteOnly]

    Organization:
      type: object
      required:
        - id
        - name
        - ownerId
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
          format: uuid
        teamCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean

    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500

    PlanningBasic:
      type: object
      required:
        - id
        - name
        - startDate
        - endDate
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isActive:
          type: boolean

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT