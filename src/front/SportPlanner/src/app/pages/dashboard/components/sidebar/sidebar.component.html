<div class="flex flex-col w-64 h-full bg-white dark:bg-gray-800 shadow-lg">
  <!-- Logo/Brand Section -->
  <div class="flex items-center px-6 py-8 border-b border-gray-200 dark:border-gray-700">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center">
        <ng-icon name="heroAcademicCap" class="w-5 h-5 text-white" />
      </div>
      <h1 class="text-xl font-bold text-gray-900 dark:text-white">SportPlanner</h1>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 py-6 space-y-2">
    @for (item of navigationItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300"
        class="flex items-center px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors duration-200 group"
      >
        <ng-icon 
          [name]="item.icon" 
          class="w-5 h-5 mr-3 group-hover:text-green-600 dark:group-hover:text-green-400" 
        />
        <span class="font-medium">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Separator -->
  <div class="px-4">
    <div class="border-t border-gray-200 dark:border-gray-700"></div>
  </div>

  <!-- User Profile Section -->
  @if (isAuthenticated() && currentUser()) {
    <div class="px-4 py-6 border-t border-gray-200 dark:border-gray-700">
      <div class="flex items-center space-x-3 mb-4">
        <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-semibold text-sm">
          {{ userInitials() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">
            {{ userDisplayName() }}
          </p>
          <p class="text-xs text-gray-500 dark:text-gray-400">
            {{ userRole() }}
          </p>
        </div>
      </div>
      
      <!-- Logout Button -->
      <button
        (click)="onLogout()"
        class="flex items-center w-full px-4 py-2 text-sm text-gray-700 dark:text-gray-300 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-700 dark:hover:text-red-300 transition-colors duration-200 group"
      >
        <ng-icon 
          name="heroArrowRightOnRectangle" 
          class="w-4 h-4 mr-3 group-hover:text-red-600 dark:group-hover:text-red-400" 
        />
        <span class="font-medium">Cerrar Sesión</span>
      </button>
    </div>
  }
</div>
