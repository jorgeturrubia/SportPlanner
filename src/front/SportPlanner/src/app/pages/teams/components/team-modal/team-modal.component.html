<!-- Modal Backdrop -->
<div 
  *ngIf="isOpen()"
  class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
  (click)="onBackdropClick($event)"
  [@fadeInOut]>
  
  <!-- Modal Container -->
  <div 
    class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-md max-h-[90vh] overflow-hidden"
    (click)="$event.stopPropagation()"
    [@slideInOut]>
    
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700">
      <h2 class="text-xl font-semibold text-gray-900 dark:text-white">
        {{ isEditMode() ? 'Editar Equipo' : 'Crear Nuevo Equipo' }}
      </h2>
      <button
        type="button"
        (click)="onClose()"
        class="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
        [attr.aria-label]="'Cerrar modal'">
        <ng-icon name="heroXMark" size="20"></ng-icon>
      </button>
    </div>
    
    <!-- Modal Body -->
    <div class="p-6 overflow-y-auto max-h-[calc(90vh-140px)]">
      <form [formGroup]="teamForm" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <!-- Team Name -->
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Nombre del Equipo *
          </label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Ingresa el nombre del equipo"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('name')"
            [class.border-gray-300]="!isFieldInvalid('name')"
            [class.dark:border-gray-600]="!isFieldInvalid('name')"
            [class.dark:bg-gray-700]="true"
            [class.dark:text-white]="true">
          <div *ngIf="isFieldInvalid('name')" class="mt-1 text-sm text-red-600 dark:text-red-400">
            {{ getFieldError('name') }}
          </div>
        </div>
        
        <!-- Sport -->
        <div>
          <label for="sport" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Deporte *
          </label>
          <select
            id="sport"
            formControlName="sport"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('sport')"
            [class.border-gray-300]="!isFieldInvalid('sport')"
            [class.dark:border-gray-600]="!isFieldInvalid('sport')"
            [class.dark:bg-gray-700]="true"
            [class.dark:text-white]="true">
            <option value="">Selecciona un deporte</option>
            <option value="futbol">Fútbol</option>
            <option value="basquet">Básquet</option>
            <option value="voley">Vóley</option>
            <option value="tenis">Tenis</option>
            <option value="natacion">Natación</option>
            <option value="atletismo">Atletismo</option>
            <option value="otro">Otro</option>
          </select>
          <div *ngIf="isFieldInvalid('sport')" class="mt-1 text-sm text-red-600 dark:text-red-400">
            {{ getFieldError('sport') }}
          </div>
        </div>
        
        <!-- Category -->
        <div>
          <label for="category" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Categoría *
          </label>
          <select
            id="category"
            formControlName="category"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('category')"
            [class.border-gray-300]="!isFieldInvalid('category')"
            [class.dark:border-gray-600]="!isFieldInvalid('category')"
            [class.dark:bg-gray-700]="true"
            [class.dark:text-white]="true">
            <option value="">Selecciona una categoría</option>
            <option value="infantil">Infantil</option>
            <option value="juvenil">Juvenil</option>
            <option value="adulto">Adulto</option>
            <option value="senior">Senior</option>
            <option value="veterano">Veterano</option>
          </select>
          <div *ngIf="isFieldInvalid('category')" class="mt-1 text-sm text-red-600 dark:text-red-400">
            {{ getFieldError('category') }}
          </div>
        </div>
        
        <!-- Players Count -->
        <div>
          <label for="playersCount" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Número de Jugadores *
          </label>
          <input
            id="playersCount"
            type="number"
            formControlName="playersCount"
            min="1"
            max="50"
            placeholder="0"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            [class.border-red-500]="isFieldInvalid('playersCount')"
            [class.border-gray-300]="!isFieldInvalid('playersCount')"
            [class.dark:border-gray-600]="!isFieldInvalid('playersCount')"
            [class.dark:bg-gray-700]="true"
            [class.dark:text-white]="true">
          <div *ngIf="isFieldInvalid('playersCount')" class="mt-1 text-sm text-red-600 dark:text-red-400">
            {{ getFieldError('playersCount') }}
          </div>
        </div>
        
        <!-- Coach Name -->
        <div>
          <label for="coachName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Nombre del Entrenador
          </label>
          <input
            id="coachName"
            type="text"
            formControlName="coachName"
            placeholder="Ingresa el nombre del entrenador (opcional)"
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors dark:bg-gray-700 dark:text-white">
        </div>
        
        <!-- Description -->
        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Descripción
          </label>
          <textarea
            id="description"
            formControlName="description"
            rows="3"
            placeholder="Descripción del equipo (opcional)"
            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none dark:bg-gray-700 dark:text-white"></textarea>
        </div>
        
      </form>
    </div>
    
    <!-- Modal Footer -->
    <div class="flex items-center justify-end space-x-3 p-6 border-t border-gray-200 dark:border-gray-700">
      <button
        type="button"
        (click)="onClose()"
        class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
        [disabled]="isLoading()">
        Cancelar
      </button>
      <button
        type="submit"
        (click)="onSubmit()"
        class="px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        [disabled]="teamForm.invalid || isLoading()">
        <span *ngIf="!isLoading()">{{ isEditMode() ? 'Actualizar' : 'Crear' }}</span>
        <span *ngIf="isLoading()" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isEditMode() ? 'Actualizando...' : 'Creando...' }}
        </span>
      </button>
    </div>
    
  </div>
</div>
