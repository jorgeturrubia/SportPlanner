<div class="min-h-screen bg-[var(--color-dashboard-bg)] transition-colors duration-200">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>
  
  <!-- Mobile Overlay -->
  <div 
    *ngIf="sidebarService.isMobileOpen()"
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
    (click)="sidebarService.closeMobile()">
  </div>
  
  <!-- Main Content Area -->
  <div 
    class="transition-all duration-300 ease-in-out"
    [style.margin-left]="contentMarginLeft()">
    
    <!-- Top Navigation Bar -->
    <nav class="bg-[var(--color-navbar-bg)] border-b border-[var(--color-navbar-border)] px-4 py-3 lg:px-6">
      <div class="flex items-center justify-between">
        <!-- Left Side: Mobile Menu Button + Title -->
        <div class="flex items-center space-x-4">
          <!-- Mobile Menu Toggle -->
          <button
            class="lg:hidden p-2 rounded-lg text-[var(--color-sidebar-text)] hover:bg-[var(--color-sidebar-hover)] transition-colors duration-200"
            (click)="sidebarService.toggleMobile()"
            [attr.aria-label]="sidebarService.isMobileOpen() ? 'Cerrar menú' : 'Abrir menú'">
            
            <ng-icon 
              [name]="sidebarService.isMobileOpen() ? 'heroXMark' : 'heroBars3'" 
              size="24">
            </ng-icon>
          </button>
          
          <!-- Desktop Sidebar Toggle -->
          <button
            class="hidden lg:block p-2 rounded-lg text-[var(--color-sidebar-text)] hover:bg-[var(--color-sidebar-hover)] transition-colors duration-200"
            (click)="sidebarService.toggle()"
            [attr.aria-label]="sidebarService.isCollapsed() ? 'Expandir sidebar' : 'Colapsar sidebar'">
            
            <ng-icon name="heroBars3" size="20"></ng-icon>
          </button>
          
          <!-- Page Title -->
          <h1 class="text-xl font-semibold text-[var(--color-sidebar-text)] truncate">
            {{ pageTitle() }}
          </h1>
        </div>
        
        <!-- Right Side: Theme Toggle + User Actions -->
        <div class="flex items-center space-x-3">
          <!-- Theme Toggle -->
          <app-theme-toggle 
            variant="dropdown"
            [showLabel]="false"
            size="20">
          </app-theme-toggle>
          
          <!-- User Info and Logout -->
          <div class="flex items-center space-x-3">
            @if (currentUser$ | async; as user) {
              <span class="hidden sm:block text-[var(--color-sidebar-text)] text-sm">Hola, {{ user.name }}</span>
              <button
                (click)="onSignOut()"
                class="bg-[var(--color-theme-toggle-bg)] hover:bg-[var(--color-theme-toggle-hover)] text-[var(--color-sidebar-text)] px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200"
              >
                Cerrar sesión
              </button>
            }
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <main 
      class="p-4 lg:p-6 min-h-[calc(100vh-73px)] bg-[var(--color-dashboard-bg)]"
      [attr.aria-label]="'Contenido principal: ' + pageTitle()">
      
      <!-- Router Outlet for Page Content -->
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
