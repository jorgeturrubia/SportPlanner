<!-- Modal Backdrop -->
<div 
  *ngIf="isOpen()"
  class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
  (click)="onBackdropClick($event)"
  (keydown)="onKeyDown($event)"
  [@fadeInOut]>
  
  <!-- Modal Container -->
  <div 
    class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-md overflow-hidden"
    (click)="$event.stopPropagation()"
    [@slideInOut]
    role="dialog"
    [attr.aria-labelledby]="'modal-title'"
    [attr.aria-describedby]="'modal-description'">
    
    <!-- Modal Content -->
    <div class="p-6">
      
      <!-- Icon and Title -->
      <div class="flex items-start space-x-4">
        <!-- Icon -->
        <div class="flex-shrink-0">
          <div class="w-10 h-10 rounded-full flex items-center justify-center"
               [class.bg-red-100]="type() === 'danger'"
               [class.dark:bg-red-900/20]="type() === 'danger'"
               [class.bg-yellow-100]="type() === 'warning'"
               [class.dark:bg-yellow-900/20]="type() === 'warning'"
               [class.bg-blue-100]="type() === 'info'"
               [class.dark:bg-blue-900/20]="type() === 'info'">
            <ng-icon 
              [name]="getIconName()" 
              size="20"
              [class]="getIconColorClass()">
            </ng-icon>
          </div>
        </div>
        
        <!-- Title and Message -->
        <div class="flex-1 min-w-0">
          <h3 id="modal-title" class="text-lg font-medium text-gray-900 dark:text-white mb-2">
            {{ title() }}
          </h3>
          <p id="modal-description" class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed">
            {{ message() }}
          </p>
        </div>
      </div>
      
    </div>
    
    <!-- Modal Footer -->
    <div class="flex items-center justify-end space-x-3 px-6 py-4 bg-gray-50 dark:bg-gray-700/50">
      <button
        type="button"
        (click)="onCancel()"
        class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
        [disabled]="isLoading()"
        [attr.aria-label]="cancelText()">
        {{ cancelText() }}
      </button>
      
      <button
        type="button"
        (click)="onConfirm()"
        class="px-4 py-2 text-sm font-medium text-white border border-transparent rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        [class]="getConfirmButtonClass()"
        [disabled]="isLoading()"
        [attr.aria-label]="confirmText()">
        
        <span *ngIf="!isLoading()">{{ confirmText() }}</span>
        
        <span *ngIf="isLoading()" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Procesando...
        </span>
      </button>
    </div>
    
  </div>
</div>
